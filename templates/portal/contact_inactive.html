<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>Portal Access</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0c0c10;
      color: #eaeaf2;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .box i { font-size: 32px; color: #72728a; margin-bottom: 14px; display: block; }
    .box h1 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .box p { font-size: 12px; color: #72728a; }
  </style>
</head>
<body>
  <div class="box">
    <i class="fa-solid fa-lock"></i>
    <h1>This portal link is no longer active.</h1>
    <p>Please contact your project owner for a new access link.</p>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>{{ contact.first_name }} — My Tasks</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent:     {{ accent }};
      --accent-dim: {{ accent }}18;
      --bg:         #0c0c10;
      --bg2:        #14141a;
      --bg3:        #1c1c24;
      --border:     #26263a;
      --text:       #eaeaf2;
      --muted:      #72728a;
      --r-sm:       6px;
      --r-lg:       14px;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      padding: 28px 16px 60px;
      max-width: 640px;
      margin: 0 auto;
    }
    .header { margin-bottom: 24px; }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .task-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .task-proj {
      font-size: 10px; color: var(--muted);
      display: flex; align-items: center; gap: 5px;
      margin-bottom: 8px;
    }
    .task-proj-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .task-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .task-title { font-weight: 600; font-size: 14px; flex: 1; min-width: 0; }
    .priority-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .priority-low    { background: #72728a; }
    .priority-normal { background: #3b82f6; }
    .priority-high   { background: #f59e0b; }
    .priority-urgent { background: #f85149; }
    .task-meta { display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--muted); }
    .task-due { display: flex; align-items: center; gap: 4px; }
    .status-select {
      margin-left: auto;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 10px; color: var(--text);
      font-family: inherit; font-size: 11px; cursor: pointer;
    }
    .status-select:focus { outline: none; border-color: var(--accent); }
    .empty {
      text-align: center; color: var(--muted);
      padding: 60px 20px; font-size: 13px;
    }
    .empty i { font-size: 28px; display: block; margin-bottom: 10px; opacity: .5; }
  </style>
</head>
<body>
{% csrf_token %}

<div class="header">
  <h1>Hi {{ contact.first_name }}</h1>
  <div class="sub">My Tasks &middot; {{ client.display_name }}</div>
</div>

{% if tasks %}
{% for t in tasks %}
<div class="task-card" data-task-id="{{ t.pk }}">
  <div class="task-proj">
    <span class="task-proj-dot" style="background:{{ t.project_color }};"></span>
    {{ t.project_name }}
  </div>
  <div class="task-top">
    <span class="priority-dot priority-{{ t.priority }}"></span>
    <span class="task-title">{{ t.title }}</span>
  </div>
  <div class="task-meta">
    {% if t.due_date %}
    <span class="task-due"><i class="fa-regular fa-calendar"></i> {{ t.due_date|date:"M j" }}</span>
    {% endif %}
    <select class="status-select" onchange="updateStatus({{ t.pk }}, this.value)">
      {% for val, label in statuses %}
      <option value="{{ val }}" {% if t.status == val %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </div>
</div>
{% endfor %}
{% else %}
<div class="empty">
  <i class="fa-regular fa-circle-check"></i>
  No tasks assigned right now.
</div>
{% endif %}

<script>
const CONTACT_TOKEN = '{{ contact.portal_token }}';

function getCookie(name) {
  const m = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
  return m ? decodeURIComponent(m.pop()) : '';
}
const CSRF_TOKEN = getCookie('csrftoken');

async function updateStatus(taskPk, status) {
  const res = await fetch('/portal/contact/' + CONTACT_TOKEN + '/tasks/' + taskPk + '/status/', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'X-CSRFToken': CSRF_TOKEN},
    body: JSON.stringify({status}),
  });
  if (!res.ok) {
    const data = await res.json().catch(() => ({}));
    alert(data.error || 'Could not update status.');
  }
}
</script>
</body>
</html>

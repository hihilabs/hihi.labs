{% extends 'base.html' %}
{% block title %}Delete Contract{% endblock %}
{% block content %}
<div style="padding:24px;max-width:480px;">
  <h1 style="font-size:20px;font-weight:var(--weight-bold);margin-bottom:12px;">Delete {{ contract.title }}?</h1>
  <p style="color:var(--text-muted);font-size:14px;margin-bottom:20px;">This cannot be undone.</p>
  <form method="post">
    {% csrf_token %}
    <div style="display:flex;gap:8px;">
      <button type="submit" class="btn btn-primary" style="background:var(--red);border-color:var(--red);">Delete</button>
      <a href="{% url 'contracts:detail' contract.pk %}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}

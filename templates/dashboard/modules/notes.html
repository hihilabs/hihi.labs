{% for note in notes %}
<div class="note-row" id="note-{{ note.id }}">
  <span>{{ note.content|truncatechars:80 }}</span>
  <button class="note-del" onclick="deleteNote({{ note.id }},this)">×</button>
</div>
{% empty %}
<div style="padding:2px 10px;font-size:10px;color:var(--text-dim);font-style:italic;">no notes yet</div>
{% endfor %}

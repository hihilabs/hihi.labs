services:
  hihilabs:
    build: .
    image: hihilabs
    restart: unless-stopped
    env_file: .env
    volumes:
      - hihilabs_db:/app/data
      - ./media:/app/media
      - ./logs:/app/logs
      # live source mounts — gunicorn --reload picks up .py changes instantly
      - ./apps:/app/apps
      - ./templates:/app/templates
      - ./hihilabs:/app/hihilabs
      # workspace for dev tools (read/write via Claude)
      - ./:/workspace
      # SSH key for HiHi Node git operations
      - /root/.ssh/id_ed25519_unraid:/app/ssh/id_ed25519_unraid:ro
      # docker socket for rebuild tool
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hihilabs.rule=Host(`local.hihilabs.xyz`)"
      - "traefik.http.routers.hihilabs.entrypoints=websecure"
      - "traefik.http.routers.hihilabs.tls=true"
      - "traefik.http.routers.hihilabs.tls.certresolver=letsencrypt"
      - "traefik.http.services.hihilabs.loadbalancer.server.port=8000"
    networks:
      - traefik
    depends_on:
      - hihilabs-redis

  # channel layer backend (rooms websockets) — REDIS_CHANNEL_URL in .env
  hihilabs-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly no --save ""
    networks:
      - traefik

networks:
  traefik:
    external: true

volumes:
  hihilabs_db:
